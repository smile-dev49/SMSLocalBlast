<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMS LocalBlast</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>SMS LocalBlast</h1>
    </header>

    <!-- Login screen -->
    <div id="login-screen" class="screen">
      <div class="card">
        <h2>Sign in</h2>
        <p class="hint">Use your API account. Or try <strong>demo@localblast.com</strong> with any password for sandbox (no real SMS).</p>
        <form id="login-form">
          <input type="email" id="email" placeholder="Email" required />
          <input type="password" id="password" placeholder="Password" required />
          <p id="login-error" class="error" style="display:none;"></p>
          <button type="submit" class="btn btn-primary">Sign in</button>
        </form>
      </div>
    </div>

    <!-- Main screen (after login) -->
    <div id="main-screen" class="screen" style="display:none;">
      <div class="user-info">
        <span id="user-email"></span>
        <button id="logout-btn" class="btn-link">Sign out</button>
      </div>

      <div class="card">
        <h3>Send from sheet</h3>
        <p class="hint">Columns: <strong>Phone</strong>, <strong>Message</strong>. Optional <strong>Media URL</strong>. Use <code>{{Name}}</code>, <code>{{Balance}}</code>, etc. for personalization (match column headers).</p>
        <button id="send-btn" class="btn btn-primary">Enqueue messages</button>
        <p id="send-status" class="status"></p>
      </div>
    </div>
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
