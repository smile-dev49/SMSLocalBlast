<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMS LocalBlast — Setup</title>
  <link rel="stylesheet" href="/install/install.css" />
</head>
<body>
  <div id="app">
    <div class="wizard">
      <h1>SMS LocalBlast Setup</h1>
      <div class="steps">
        <span class="step" data-step="1">1. Database</span>
        <span class="step" data-step="2">2. Branding</span>
        <span class="step" data-step="3">3. Admin</span>
      </div>

      <form id="install-form">
        <div id="step-1" class="step-panel">
          <h2>Database (Supabase)</h2>
          <p class="hint">Create a project at <a href="https://supabase.com" target="_blank">supabase.com</a>. Run <code>sql/001_initial.sql</code> and <code>sql/002_claim_next_message.sql</code> in the SQL Editor.</p>
          <label>Supabase URL</label>
          <input type="url" name="supabase_url" placeholder="https://xxxx.supabase.co" required />
          <label>Service Role Key</label>
          <input type="password" name="supabase_service_key" placeholder="eyJhbGc..." required />
          <label>Anon / Publishable Key (optional)</label>
          <input type="password" name="supabase_anon_key" placeholder="Optional" />
        </div>

        <div id="step-2" class="step-panel" style="display:none;">
          <h2>Branding</h2>
          <label>Site name</label>
          <input type="text" name="site_name" placeholder="SMS LocalBlast" />
          <label>Support email</label>
          <input type="email" name="support_email" placeholder="support@example.com" />
          <label>Primary color</label>
          <input type="text" name="primary_color" value="#1b4d89" placeholder="#1b4d89" />
        </div>

        <div id="step-3" class="step-panel" style="display:none;">
          <h2>Admin account</h2>
          <label>Admin email</label>
          <input type="email" name="admin_email" required />
          <label>Admin password</label>
          <input type="password" name="admin_password" minlength="8" required />
        </div>

        <div class="actions">
          <button type="button" id="prev-btn" class="btn btn-secondary" style="display:none;">Back</button>
          <button type="button" id="next-btn" class="btn btn-primary">Next</button>
          <button type="submit" id="submit-btn" class="btn btn-primary" style="display:none;">Install</button>
        </div>
      </form>

      <p id="install-error" class="error" style="display:none;"></p>
      <p id="install-success" class="success" style="display:none;"></p>
    </div>
  </div>
  <script src="/install/install.js"></script>
</body>
</html>
