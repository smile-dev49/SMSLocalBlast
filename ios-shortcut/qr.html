<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMS LocalBlast — iOS Setup</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 { color: #1b4d89; font-size: 20px; margin: 0 0 8px 0; }
    p { color: #666; font-size: 14px; line-height: 1.5; margin: 0 0 24px 0; }
    #qrcode { margin: 16px 0; padding: 16px; background: #fff; border-radius: 8px; display: inline-block; }
    #qrcode canvas { display: block; }
    .link { font-size: 12px; color: #999; margin-top: 16px; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <h1>SMS LocalBlast — iOS Setup</h1>
    <p>Scan with your iPhone to open the setup guide. Follow the recipe to create the Shortcut.</p>
    <div id="qrcode"></div>
    <p class="link" id="url-display"></p>
  </div>
  <script>
    const base = window.location.href.replace(/qr\.html(\?.*)?$/, '');
    const url = base.endsWith('/') ? base : base + '/';
    document.getElementById('url-display').textContent = url;
    QRCode.toDataURL(url, { width: 200, margin: 2 }, function (err, dataUrl) {
      if (!err) {
        const img = document.createElement('img');
        img.src = dataUrl;
        img.alt = 'QR Code';
        document.getElementById('qrcode').appendChild(img);
      }
    });
  </script>
</body>
</html>
